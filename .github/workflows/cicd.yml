name: go-kopi-cicd
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.24.12
      - name: Build
        run: go build -o main main.go
      - name: Test
        run: go test ./...
      - name: Lint
        run: go lint ./...
      - name: Build Docker image
        run: docker build -t go-kopi .
      - name: Push Docker image
        run: docker push go-kopi